name: linvnix
description: "Vietnamese language learning mobile app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.3

  # HTTP
  dio: ^5.7.0

  # JSON models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local DB
  drift: ^2.24.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Storage
  flutter_secure_storage: ^10.1.0
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^7.1.1

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Google Sign-In
  google_sign_in: ^7.2.0

  # Biometric
  local_auth: ^3.0.1

  # Audio/Video
  just_audio: ^0.10.5
  chewie: ^1.11.0
  video_player: ^2.9.3

  # Images
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Env
  flutter_dotenv: ^6.0.1

  # Fonts
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0
  flutter_svg: ^2.3.0

  # Markdown rendering — declared early per slice #03 so slice #04
  # (AI response rendering) doesn't need a separate dependency-bump PR.
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  drift_dev: ^2.24.0
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/google_logo.svg
