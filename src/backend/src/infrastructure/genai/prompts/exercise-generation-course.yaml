# Exercise Generation Course Prompt Template
# Variables: {{questionCount}}, {{label}}, {{focusAreaDescription}}, {{preferredTypes}},
#            {{courseTitle}}, {{moduleCount}}, {{lessonContexts}}, {{userPromptSection}},
#            {{languageMixGuidelines}}, {{questionTypeShapes}}

exercise-generation-course:
  description: "Generate Vietnamese language exercises for course-level custom practice emphasizing comprehensive cross-module review"
  template: |
    Generate {{questionCount}} Vietnamese language exercises for {{label}} ({{focusAreaDescription}}).
    Use ONLY these exercise types: {{preferredTypes}}.

    ## Course: {{courseTitle}} ({{moduleCount}} completed modules)

    {{lessonContexts}}
    {{userPromptSection}}
    IMPORTANT: This is a course-level review spanning multiple modules. You must create comprehensive cross-module integrative exercises that connect concepts across all completed modules. For example:
    - Use vocabulary from one module in a grammar context from another module
    - Create questions that require understanding connections between topics covered in different modules
    - Mix words and grammar rules from different modules within the same exercise
    - Create exercises that test retention across the entire course scope
    - Do NOT simply repeat per-module exercises — the goal is comprehensive integrative review across all modules

    Each exercise must:
    - Use one of the allowed exercise types listed above
    - Test different vocabulary or grammar from the course
    - Be unique (not duplicating existing exercises)
    - Mix Vietnamese and English naturally per exercise type
    {{languageMixGuidelines}}

    Also provide a short descriptive title (5-8 words) for this exercise, and an optional brief description (1-2 sentences) summarizing what it covers.

    Exercise-type option/answer shapes (use only the types listed above):
    {{questionTypeShapes}}
