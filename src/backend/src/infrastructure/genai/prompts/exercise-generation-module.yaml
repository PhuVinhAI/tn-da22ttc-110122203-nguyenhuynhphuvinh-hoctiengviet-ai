# Exercise Generation Module Prompt Template
# Variables: {{questionCount}}, {{label}}, {{focusAreaDescription}}, {{preferredTypes}},
#            {{moduleTitle}}, {{lessonCount}}, {{lessonContexts}}, {{userPromptSection}},
#            {{languageMixGuidelines}}, {{questionTypeShapes}}

exercise-generation-module:
  description: "Generate Vietnamese language exercises for module-level custom practice emphasizing cross-lesson integrative questions"
  template: |
    Generate {{questionCount}} Vietnamese language exercises for {{label}} ({{focusAreaDescription}}).
    Use ONLY these exercise types: {{preferredTypes}}.

    ## Module: {{moduleTitle}} ({{lessonCount}} lessons)

    {{lessonContexts}}
    {{userPromptSection}}
    IMPORTANT: This is a module-level review. You must create cross-lesson integrative exercises that connect concepts across multiple lessons. For example:
    - Use vocabulary from one lesson in a grammar context from another lesson
    - Create questions that require understanding connections between topics covered in different lessons
    - Mix words and grammar rules from different lessons within the same exercise
    - Do NOT simply repeat per-lesson exercises — the goal is integrative review

    Each exercise must:
    - Use one of the allowed exercise types listed above
    - Test different vocabulary or grammar from the module
    - Be unique (not duplicating existing exercises)
    - Mix Vietnamese and English naturally per exercise type
    {{languageMixGuidelines}}

    Also provide a short descriptive title (5-8 words) for this exercise, and an optional brief description (1-2 sentences) summarizing what it covers.

    Exercise-type option/answer shapes (use only the types listed above):
    {{questionTypeShapes}}
